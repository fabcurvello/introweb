<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagens</title>
  </head>
  <body>
    <h1>Imagens</h1>

    <img src="../img/camisa.jpg" height="120" alt="camisa branca.jpg" /><br />
    <figure>
      <img
        src="../img/bolo.jpg"
        width="150"
        loading="lazy"
        alt="bolo de cenoura com calda de chocolate e cookie"
      /><br />
    </figure>

    <figure>
      <img src="../img/iphone.jpg" width="150" />
      <figcaption>iPhone 17 Pro Max Laranja</figcaption>
    </figure>

    <h1>Vídeos</h1>

    <video controls width="400" muted loop poster="../img/camisa.jpg">
      <source src="../video/video.mp4" type="video/mp4" />
      Seu navegador não suporta a reprodução de vídeos.
    </video>

    <h1>iframe youtube</h1>

    <iframe
      width="300"
      src="https://www.youtube.com/embed/Bt1AGCual7Q?si=pVWRgFWTiGruXWBu"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h1>iframe Google Maps</h1>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3675.0860056152533!2d-43.20090358851754!3d-22.910198379166207!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997f0c4e687185%3A0x973c7a140b9b61fa!2sEdif%C3%ADcio%20Eco%20Sapuca%C3%AD!5e0!3m2!1spt-BR!2sbr!4v1783607144965!5m2!1spt-BR!2sbr"
      width="600"
      height="200"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </body>
</html>
